{% extends "base.html" %}
{% block title %}Server Error — GigGreen{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-page__content">
    <p class="error-page__code">500</p>
    <h1 class="error-page__title">Something went wrong on our end</h1>
    <p class="error-page__body">
      We've hit an unexpected error. Our team has been notified.
      Please try again in a moment.
    </p>
    <div class="error-page__actions">
      <a href="{{ url_for('index') }}" class="btn btn-primary">Go Home</a>
      <a href="javascript:location.reload()" class="btn btn-secondary">Try Again</a>
    </div>
  </div>
</div>
{% endblock %}
