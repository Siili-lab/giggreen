  </g>
  <!-- Wordmark -->
  <text x="34" y="27" font-family="Georgia, serif" font-size="17" font-weight="700" fill="#1A6B3A" letter-spacing="-0.3">Gig</text>
  <text x="60" y="27" font-family="Georgia, serif" font-size="17" font-weight="700" fill="#2D9B5A" letter-spacing="-0.3">Green</text>
</svg>
